spring:
  datasource:
    url: jdbc:h2:mem:dms;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true

# Tests drive the simulation explicitly; the wall-clock scheduler stays off so no background
# tick can race an assertion. Scheduler behaviour is unit-tested directly (SimulationSchedulerTest).
dms:
  simulation:
    auto-tick: false
