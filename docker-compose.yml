services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dms
      POSTGRES_USER: dms
      POSTGRES_PASSWORD: dms
    ports:
      - "5432:5432"
    volumes:
      - dms-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dms -d dms"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/dms
      SPRING_DATASOURCE_USERNAME: dms
      SPRING_DATASOURCE_PASSWORD: dms
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  dms-db-data:
